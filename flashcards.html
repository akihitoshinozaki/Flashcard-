<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0f1623" />
<title>Flashcards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #0f1623; color: #e8ecf4; font-family: 'Inter', sans-serif; min-height: 100%; }
  body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 26px 16px 110px; max-width: 560px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 24px; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #4db8b0; margin-bottom: 8px; font-weight: 500; }
  .header-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 32px; font-weight: 400; color: #f0f4ff; letter-spacing: -0.02em; }
  .header-title span { color: #4db8b0; font-style: italic; }
  .header-sub { font-size: 13px; color: #7a8499; margin-top: 6px; }

  /* bottom tab bar - thumb friendly on phones */
  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #131b2b; border-top: 1px solid #242d42; display: flex; justify-content: space-around; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index: 50; }
  .tab { flex: 1; background: none; border: none; color: #5a6480; font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; padding: 6px 2px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
  .tab .ico { font-size: 19px; line-height: 1; }
  .tab.active { color: #4db8b0; }
  .tab-badge { position: absolute; top: -2px; right: 50%; margin-right: -22px; background: #e0664f; color: #fff; font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

  .deck-info { font-size: 12px; color: #5a6480; text-align: center; margin-bottom: 16px; letter-spacing: 0.06em; text-transform: uppercase; }
  .deck-info b { color: #4db8b0; font-weight: 600; }

  .card-wrapper { perspective: 1200px; width: 100%; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 300px; transition: transform 0.55s cubic-bezier(0.4,0.2,0.2,1); transform-style: preserve-3d; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
  .card-front { background: linear-gradient(145deg, #1e2a40, #1a243a); border: 1px solid #2a3550; box-shadow: 0 18px 50px rgba(0,0,0,0.4); }
  .card-back { background: linear-gradient(145deg, #162830, #1a2e30); border: 1px solid #2a4040; box-shadow: 0 18px 50px rgba(0,0,0,0.4); transform: rotateY(180deg); }
  .card-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #4db8b0; margin-bottom: 16px; font-weight: 600; }
  .card-front .card-label { color: #6070a0; }
  .card-word { font-family: 'Crimson Pro', Georgia, serif; font-size: 34px; font-weight: 600; color: #f0f4ff; line-height: 1.2; }
  .card-hint { font-size: 12px; color: #3a4460; margin-top: 16px; }
  .card-definition { font-size: 15.5px; line-height: 1.65; color: #c8d8d4; font-weight: 300; }

  .card-controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 20px; width: 100%; flex-wrap: wrap; }
  .ctrl-btn { font-size: 24px; background: #1a2235; border: 1px solid #242d42; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #7a8499; }
  .ctrl-btn:active:not(:disabled) { background: #242d42; }
  .ctrl-btn:disabled { opacity: 0.25; }
  .card-counter { font-size: 13px; color: #5a6480; min-width: 54px; text-align: center; }
  .remove-btn { font-family: 'Inter', sans-serif; font-size: 12px; background: transparent; border: 1px solid #1a4035; border-radius: 8px; padding: 9px 16px; cursor: pointer; color: #4db8b0; }
  .remove-btn:active { background: #0e2520; }

  .dots { display: flex; gap: 6px; justify-content: center; margin-top: 18px; width: 100%; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #242d42; cursor: pointer; }
  .dot.active { background: #4db8b0; transform: scale(1.3); }

  .panel { width: 100%; }
  .panel-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 23px; color: #c8d0e4; margin-bottom: 6px; font-weight: 400; }
  .panel-desc { font-size: 13px; color: #5a6480; line-height: 1.55; margin-bottom: 20px; }

  .field-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #4db8b0; font-weight: 500; margin-bottom: 7px; display: block; }
  .field-input, .field-textarea { width: 100%; background: #1a2235; border: 1px solid #242d42; border-radius: 9px; padding: 13px 15px; font-family: 'Inter', sans-serif; font-size: 16px; color: #e0e6f4; resize: none; outline: none; }
  .field-input:focus, .field-textarea:focus { border-color: #4db8b0; }
  .field-textarea { height: 140px; line-height: 1.6; font-size: 15px; }
  .row { display: flex; gap: 10px; margin-bottom: 16px; }
  .row .field-input { margin-bottom: 0; }
  .mb { margin-bottom: 16px; }

  .gen-btn { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; background: #242d42; color: #4db8b0; border: 1px solid #2a3550; border-radius: 9px; padding: 0 18px; cursor: pointer; white-space: nowrap; }
  .gen-btn:active:not(:disabled) { background: #2a3550; }
  .gen-btn:disabled { opacity: 0.4; }

  .def-meta { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 7px; }
  .regen-link { font-size: 12px; color: #6070a0; background: none; border: none; cursor: pointer; text-decoration: underline; }

  .primary-btn { width: 100%; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; background: #4db8b0; color: #0f1623; border: none; border-radius: 10px; padding: 14px; cursor: pointer; margin-top: 18px; }
  .primary-btn:active:not(:disabled) { background: #3da8a0; }
  .primary-btn:disabled { opacity: 0.4; }

  .toast { font-size: 13px; color: #4db8b0; margin-top: 12px; text-align: center; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
  .err { font-size: 12.5px; color: #e0807a; margin-top: 10px; line-height: 1.5; background: #2a1020; border: 1px solid #4a2030; border-radius: 8px; padding: 10px 12px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #4db8b0; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .review-card { background: linear-gradient(145deg, #1e2a40, #1a243a); border: 1px solid #2a3550; border-radius: 18px; padding: 30px; box-shadow: 0 18px 50px rgba(0,0,0,0.4); text-align: center; }
  .review-stage { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #6070a0; margin-bottom: 14px; font-weight: 600; }
  .review-word { font-family: 'Crimson Pro', Georgia, serif; font-size: 32px; font-weight: 600; color: #f0f4ff; margin-bottom: 8px; }
  .review-prompt { font-size: 13px; color: #5a6480; margin-bottom: 20px; }
  .reveal-btn { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; background: #242d42; color: #c8d0e4; border: 1px solid #2a3550; border-radius: 9px; padding: 12px 28px; cursor: pointer; }
  .review-answer { font-size: 15.5px; line-height: 1.65; color: #c8d8d4; font-weight: 300; border-top: 1px solid #2a3550; padding-top: 20px; margin-top: 4px; text-align: left; }
  .review-grade { display: flex; gap: 10px; margin-top: 22px; }
  .grade-btn { flex: 1; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600; border-radius: 9px; padding: 14px 8px; cursor: pointer; border: 1px solid; }
  .grade-forgot { background: #2a1020; color: #e0807a; border-color: #4a2030; }
  .grade-got { background: #0e2520; color: #4db8b0; border-color: #1a4035; }
  .review-progress { font-size: 12px; color: #5a6480; text-align: center; margin-bottom: 16px; }
  .review-progress b { color: #4db8b0; }

  .all-done { text-align: center; padding: 44px 24px; background: #1a2235; border: 1px solid #242d42; border-radius: 16px; }
  .all-done-icon { font-size: 40px; margin-bottom: 12px; color: #4db8b0; }
  .all-done-title { font-family: 'Crimson Pro', Georgia, serif; font-size: 24px; color: #4db8b0; margin-bottom: 8px; }
  .all-done-sub { font-size: 13px; color: #7a8499; line-height: 1.7; }

  .sched-item, .list-item { display: flex; justify-content: space-between; align-items: center; background: #1a2235; border: 1px solid #242d42; border-radius: 11px; padding: 14px 16px; margin-bottom: 9px; gap: 12px; }
  .list-item { align-items: flex-start; }
  .sched-word, .list-word { font-family: 'Crimson Pro', Georgia, serif; font-size: 18px; font-weight: 600; color: #d0d8f0; }
  .sched-stage { font-size: 11px; color: #5a6480; margin-top: 2px; }
  .list-def { font-size: 12.5px; color: #5a6480; line-height: 1.5; margin-top: 4px; }
  .sched-due { font-size: 12px; font-weight: 600; white-space: nowrap; padding: 5px 10px; border-radius: 7px; }
  .due-now { color: #e0807a; background: #2a1020; }
  .due-soon { color: #d4a04a; background: #2a2210; }
  .due-later { color: #5a8a84; background: #0e2018; }
  .list-remove { font-size: 18px; background: none; border: none; color: #4a3038; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
  .list-remove:active { color: #c06070; background: #2a1020; }

  .empty-state { text-align: center; padding: 44px 24px; color: #3a4460; font-size: 14px; line-height: 1.8; }

  .banner { width: 100%; background: #2a2210; border: 1px solid #4a3a18; border-radius: 11px; padding: 13px 15px; font-size: 12.5px; color: #d4a04a; line-height: 1.5; margin-bottom: 18px; }
  .banner a, .link { color: #4db8b0; cursor: pointer; text-decoration: underline; }
  .settings-note { font-size: 12px; color: #5a6480; line-height: 1.6; margin: 6px 0 18px; }
  .ok-pill { display: inline-block; font-size: 11px; font-weight: 600; color: #4db8b0; background: #0e2520; border: 1px solid #1a4035; border-radius: 20px; padding: 3px 11px; }

  .mix-row { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .mix-btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; background: #1a2235; color: #c8d0e4; border: 1px solid #2a3550; border-radius: 9px; padding: 10px 18px; cursor: pointer; }
  .mix-btn:active { background: #242d42; }
  .mix-btn.alt { color: #7a8499; }

  .review-card { position: relative; }
  .card-wrapper { position: relative; will-change: transform; touch-action: pan-y; }
  .swipe-hint { position: absolute; top: 16px; font-size: 14px; font-weight: 800; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 9px; border: 2.5px solid; opacity: 0; pointer-events: none; z-index: 5; }
  .swipe-hint.got { right: 14px; color: #4db8b0; border-color: #4db8b0; transform: rotate(10deg); }
  .swipe-hint.forgot { left: 14px; color: #e0807a; border-color: #e0807a; transform: rotate(-10deg); }
  .swipe-tip { text-align: center; font-size: 11.5px; color: #4a5570; margin-top: 14px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
"use strict";

// ---------- constants ----------
var DAY = 24*60*60*1000;
var INTERVALS = [1,3,7,14,30]; // days: 1d -> 3d -> 1wk -> 2wk -> 1mo
var DECK_KEY = "flashcards-deck-v1";
var SET_KEY  = "flashcards-settings-v1";
var SESSION_KEY = "flashcards-session-v1";

var DEFAULTS = [
  { front:"Phantom Lesion", back:"An abnormality that appears on medical imaging but does not actually exist in the patient. Usually caused by imaging artifacts, patient movement, or misreading normal anatomy as pathology." },
  { front:"Anatomical Disorder", back:"A condition involving structural abnormalities of the body \u2014 organs or tissues that are malformed, mispositioned, or absent. Distinct from functional disorders, which affect how the body works rather than how it is built." },
  { front:"Biopsy", back:"A procedure in which a small tissue or cell sample is removed for microscopic examination, used to diagnose disease (especially cancer). Types include needle, surgical, and endoscopic biopsy." }
];

// ---------- safe storage (works on phone; degrades in sandboxes) ----------
var memStore = {};
var storageOK = true;
try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); } catch(e){ storageOK = false; }
function load(key, fallback){
  try { var v = storageOK ? localStorage.getItem(key) : memStore[key]; return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function save(key, val){
  try { var s = JSON.stringify(val); if(storageOK) localStorage.setItem(key,s); else memStore[key]=s; } catch(e){}
}

// ---------- state ----------
function makeCard(c, addedAt){
  addedAt = addedAt || Date.now();
  return { id:(Date.now()+Math.random()).toString(36), front:c.front, back:c.back,
           addedAt:addedAt, level:0, nextReview:addedAt + INTERVALS[0]*DAY, lastReviewed:null, inRotation:false };
}
var cards = load(DECK_KEY, null);
if(!cards){ cards = DEFAULTS.map(function(c){return makeCard(c);}); save(DECK_KEY, cards); }
else { cards.forEach(function(c){ if(typeof c.inRotation==="undefined") c.inRotation = (c.lastReviewed!=null) || (c.level>0); }); }

var settings = load(SET_KEY, { baseUrl:"https://api.groq.com/openai/v1", apiKey:"", model:"llama-3.3-70b-versatile" });

var view = "browse";
var flipped = false;
var idx = 0;
var revealed = false;
var genState = { busy:false, error:"", value:"", word:"" };
var toastMsg = "";
var browseOrder = null; // when set, an array of card ids defining a shuffled browse order
var swipe = { el:null, id:null, startX:0, x:0, dragging:false };
var pendingImport = null; // cards parsed from a link, awaiting confirmation
var importText = "";
var importMsg = "";
var shareLink = "";

// Restore last session (current position + mixed order) so a refresh resumes where you left off.
(function(){
  var s = load(SESSION_KEY, null);
  if(s){
    if(typeof s.idx === "number") idx = s.idx;
    if(s.browseOrder && s.browseOrder.length) browseOrder = s.browseOrder;
  }
})();
function persistSession(){ save(SESSION_KEY, { idx:idx, browseOrder:browseOrder }); }

// ---------- helpers ----------
function dueCards(){ var now=Date.now(); return cards.filter(function(c){return c.nextReview<=now;}).sort(function(a,b){return a.nextReview-b.nextReview;}); }
function stageLabel(level){ return level>=INTERVALS.length ? "Mastered" : ("Stage "+(level+1)+" of "+INTERVALS.length); }
function dueLabel(next){ var d=next-Date.now(); if(d<=0) return {t:"Due now",c:"due-now"}; var days=Math.ceil(d/DAY); if(days===1) return {t:"Tomorrow",c:"due-soon"}; if(days<=3) return {t:"In "+days+" days",c:"due-soon"}; return {t:"In "+days+" days",c:"due-later"}; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function persist(){ save(DECK_KEY, cards); }
function shuffleArr(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
// ---------- import / share ----------
function strToB64(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64ToStr(b){ return decodeURIComponent(escape(atob(b))); }
function buildShareLink(list){
  var json = JSON.stringify({ cards: list.map(function(c){ return { front:c.front, back:c.back }; }) });
  return location.origin + location.pathname + "#import=" + encodeURIComponent(strToB64(json));
}
// Accepts JSON ({cards:[{front,back}]} or a bare array, with several key aliases)
// OR plain lines in "Term :: Definition" format. Returns [{front,back}] or null.
function parsePack(text){
  text=(text||"").trim();
  if(!text) return null;
  var out=[];
  if(text.charAt(0)==="{" || text.charAt(0)==="["){
    try{
      var data=JSON.parse(text);
      var arr = Array.isArray(data) ? data : (data && data.cards ? data.cards : null);
      if(arr) arr.forEach(function(o){
        if(!o) return;
        var f=o.front||o.term||o.word||o.q||o.question;
        var b=o.back||o.definition||o.meaning||o.def||o.a||o.answer;
        if(f && b) out.push({ front:String(f).trim(), back:String(b).trim() });
      });
    }catch(e){ return null; }
  } else {
    text.split(/\r?\n/).forEach(function(line){
      line=line.trim(); if(!line) return;
      var sep = line.indexOf("::")>=0 ? "::" : (line.indexOf("\t")>=0 ? "\t" : null);
      if(!sep) return;
      var i=line.indexOf(sep);
      var f=line.slice(0,i).trim(), b=line.slice(i+sep.length).trim();
      if(f && b) out.push({ front:f, back:b });
    });
  }
  return out.length ? out : null;
}
function importCards(list){
  if(!list || !list.length) return;
  list.forEach(function(c){ cards.push(makeCard({ front:c.front, back:c.back })); });
  persist();
  var n=list.length;
  pendingImport=null; importText=""; importMsg="";
  toastMsg="\u2713 Imported "+n+" card"+(n!==1?"s":"")+" \u2014 first review tomorrow";
  view="browse"; idx=0; browseOrder=null; flipped=false;
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 2800);
}
// Browse order: natural by default, or a shuffled list of ids when "Mix" is on.
function getOrdered(){
  if(!browseOrder) return cards;
  var byId={}; cards.forEach(function(c){ byId[c.id]=c; });
  var seen={}, list=[];
  browseOrder.forEach(function(id){ if(byId[id]){ list.push(byId[id]); seen[id]=1; } });
  cards.forEach(function(c){ if(!seen[c.id]) list.push(c); }); // append any new/unmixed cards
  return list;
}
// Cards needing attention on the front page: brand-new (not yet known) OR back due for review.
function activeList(){
  var now=Date.now();
  return getOrdered().filter(function(c){ return !c.inRotation || c.nextReview<=now; });
}

// ---------- actions ----------
function go(v){ view=v; revealed=false; flipped=false; render(); }
function flip(){ flipped=!flipped; render(); }
function nav(d){ var n=activeList().length; idx=Math.max(0,Math.min(n-1, idx+d)); flipped=false; render(); }
function jump(i){ idx=i; flipped=false; render(); }

function mixCards(){
  if(cards.length<2) return;
  browseOrder = shuffleArr(cards.map(function(c){ return c.id; }));
  idx=0; flipped=false;
  toastMsg="\uD83D\uDD00 Cards mixed";
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 2000);
}
function resetOrder(){ browseOrder=null; idx=0; flipped=false; render(); }

function removeCard(id){
  cards = cards.filter(function(c){return c.id!==id;});
  var n=activeList().length;
  if(idx>=n) idx=Math.max(0,n-1);
  persist(); render();
}
function grade(id, remembered){
  var t=Date.now();
  cards = cards.map(function(c){
    if(c.id!==id) return c;
    var level = remembered ? c.level+1 : 0;
    var i = Math.min(level, INTERVALS.length-1);
    return Object.assign({}, c, { level:level, lastReviewed:t, nextReview:t + INTERVALS[i]*DAY });
  });
  revealed=false; persist(); render();
}
// "I know this" from the Browse tab: keep the card, just space it out further.
// It still returns for review on schedule (and monthly once mastered) instead of being deleted.
function knowIt(id){
  var t=Date.now();
  cards = cards.map(function(c){
    if(c.id!==id) return c;
    var level = c.level+1;
    var i = Math.min(level, INTERVALS.length-1);
    return Object.assign({}, c, { level:level, lastReviewed:t, nextReview:t + INTERVALS[i]*DAY });
  });
  persist();
  flipped=false;
  toastMsg="\u2713 Spaced out \u2014 it will still come back for review";
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 2600);
}
function addCard(word, def){
  if(!word.trim()||!def.trim()) return;
  cards.push(makeCard({front:word.trim(), back:def.trim()}));
  persist();
  genState={busy:false,error:"",value:"",word:""};
  toastMsg="\u2713 Added \u2014 first review scheduled for tomorrow";
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 2600);
}

function saveSettings(baseUrl, apiKey, model){
  settings = { baseUrl:baseUrl.trim().replace(/\/+$/,""), apiKey:apiKey.trim(), model:model.trim()||"llama-3.3-70b-versatile" };
  save(SET_KEY, settings);
  toastMsg="\u2713 Settings saved on this device";
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 2600);
}

// ---------- swipe-to-grade (Cards tab) ----------
// Swipe right = "I know it": send the card into spaced review (and stretch the interval each time).
// Swipe left  = "I don't know": keep it on the front page so it keeps showing up now.
function browseGrade(id, remembered){
  var t=Date.now();
  cards = cards.map(function(c){
    if(c.id!==id) return c;
    if(remembered){
      var lvl = c.inRotation ? Math.min(c.level+1, INTERVALS.length-1) : 0;
      return Object.assign({}, c, { inRotation:true, level:lvl, lastReviewed:t, nextReview:t + INTERVALS[lvl]*DAY });
    }
    return Object.assign({}, c, { inRotation:false, level:0 }); // stays active on the front page
  });
  persist();
  var n=activeList().length;
  if(n===0) idx=0;
  else if(remembered){ if(idx>=n) idx=n-1; }   // card left the page; the next one slides into its place
  else idx=(idx+1)%n;                            // card stays; move on to the next one to study
  flipped=false;
  toastMsg = remembered ? "\u2713 Got it \u2014 sent to review" : "\u21BA Keeping it here to study";
  render();
  setTimeout(function(){ toastMsg=""; render(); }, 1500);
}
function setSwipeHints(dx){
  var go=document.getElementById("hintGot"), fo=document.getElementById("hintForgot");
  if(go) go.style.opacity = dx>0 ? Math.min(1, dx/110) : 0;
  if(fo) fo.style.opacity = dx<0 ? Math.min(1, -dx/110) : 0;
}
function swipeStart(e){
  var card=e.currentTarget;
  swipe.el=card; swipe.id=card.getAttribute("data-id"); swipe.mode=card.getAttribute("data-swipe");
  swipe.dragging=true; swipe.decided=false; swipe.moved=false;
  var p=e.touches?e.touches[0]:e;
  swipe.startX=p.clientX; swipe.startY=p.clientY; swipe.x=0;
  card.style.transition="none";
}
function swipeMove(e){
  if(!swipe.dragging||!swipe.el) return;
  var p=e.touches?e.touches[0]:e;
  var dx=p.clientX-swipe.startX, dy=p.clientY-swipe.startY;
  if(!swipe.decided){
    if(Math.abs(dx)<5 && Math.abs(dy)<5) return;        // too small to decide yet
    if(Math.abs(dy)>Math.abs(dx)){                       // vertical intent: let the page scroll
      swipe.dragging=false; swipe.el.style.transition=""; swipe.el.style.transform=""; return;
    }
    swipe.decided=true;
  }
  swipe.x=dx; swipe.moved=true;
  swipe.el.style.transform="translateX("+dx+"px) rotate("+(dx*0.05)+"deg)";
  setSwipeHints(dx);
  if(e.cancelable) e.preventDefault();
}
function swipeEnd(){
  if(!swipe.dragging) return;
  swipe.dragging=false;
  if(!swipe.el) return;
  var dx=swipe.x, el=swipe.el, id=swipe.id, mode=swipe.mode, W=window.innerWidth||400;
  if(swipe.moved && Math.abs(dx)>90){
    var dir=dx>0?1:-1, remembered=dx>0;
    el.style.transition="transform 0.35s ease, opacity 0.35s ease";
    el.style.transform="translateX("+(dir*W*1.2)+"px) rotate("+(dir*16)+"deg)";
    el.style.opacity="0";
    swipe.el=null;
    setTimeout(function(){ browseGrade(id, remembered); }, 330);
  } else if(swipe.moved){
    el.style.transition="transform 0.25s ease";
    el.style.transform="";
    setSwipeHints(0);
  } else {                                                // no drag = a tap: flip the card
    el.style.transition=""; el.style.transform="";
    if(mode==="browse") flip();
  }
}
function generate(word){
  word = (word||"").trim();
  if(!word) return;
  if(!settings.apiKey){ genState.error="Add your free API key in Settings first (tap the gear)."; render(); return; }
  genState.busy=true; genState.error=""; genState.word=word; render();

  var prompt = 'Write a clear, accurate flashcard definition for the term "'+word+'". '+
    'Keep it to 1-3 sentences a student could study from. If it is a medical, scientific, or technical term, '+
    'include the essential meaning and any key distinction worth knowing. '+
    'Respond with ONLY the definition text \u2014 do not repeat the term, no preamble, no quotation marks.';

  fetch(settings.baseUrl + "/chat/completions", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+settings.apiKey },
    body: JSON.stringify({ model:settings.model, max_tokens:300, temperature:0.4,
      messages:[{role:"user", content:prompt}] })
  })
  .then(function(res){ return res.text().then(function(txt){ return {ok:res.ok, status:res.status, txt:txt}; }); })
  .then(function(r){
    var data=null; try{ data=JSON.parse(r.txt); }catch(e){}
    if(!r.ok){
      var m = (data && data.error && data.error.message) ? data.error.message : ("HTTP "+r.status);
      genState.busy=false; genState.error="API error: "+m; render(); return;
    }
    var text = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    text = (text||"").trim();
    genState.busy=false;
    if(text){ genState.value=text; genState.error=""; }
    else { genState.error="No text came back. Try a different model name in Settings, or type a definition."; }
    render();
  })
  .catch(function(err){
    genState.busy=false;
    genState.error="Couldn't reach the API ("+(err&&err.message||"network/CORS error")+"). Check the key, model, and connection.";
    render();
  });
}

// ---------- render ----------
function render(){
  var act = activeList().length;
  var html = "";

  html += '<div class="header">'+
    '<div class="header-eyebrow">Medical Vocabulary</div>'+
    '<div class="header-title">Flash<span>cards</span></div>'+
    '<div class="header-sub">'+cards.length+' card'+(cards.length!==1?'s':'')+' \u00b7 '+act+' to study</div>'+
  '</div>';

  if(!storageOK){
    html += '<div class="banner">Heads up: this looks like a preview that blocks saving. <b>Download this file and open it on your phone</b> so your cards and key are saved on your device.</div>';
  }

  if(view==="browse") html += renderBrowse();
  else if(view==="add") html += renderAdd();
  else if(view==="import") html += renderImport();
  else if(view==="schedule") html += renderSchedule();
  else if(view==="list") html += renderList();
  else if(view==="settings") html += renderSettings();

  if(toastMsg) html += '<div class="toast show">'+esc(toastMsg)+'</div>';

  // tab bar
  var tabs = [["browse","Cards","\u25A1"],["add","Add","\uFF0B"],["import","Import","\u21E9"],["schedule","Due","\u23F1"],["settings","Setup","\u2699"]];
  html += '<div class="tabbar">';
  tabs.forEach(function(t){
    var active = (view===t[0] || (view==="list"&&t[0]==="browse")) ? " active":"";
    var badge = (t[0]==="browse" && act>0) ? '<span class="tab-badge">'+act+'</span>' : '';
    html += '<button class="tab'+active+'" data-go="'+t[0]+'"><span class="ico">'+t[2]+'</span>'+t[1]+badge+'</button>';
  });
  html += '</div>';

  document.getElementById("app").innerHTML = html;
  persistSession();
  wire();
}

function renderBrowse(){
  if(cards.length===0) return '<div class="empty-state">Your deck is empty.<br/>Tap <b>Add</b> or <b>Import</b> to create cards.</div>';
  var list = activeList();
  if(list.length===0) return '<div class="all-done"><div class="all-done-icon">\u2713</div><div class="all-done-title">Nothing to study now</div><div class="all-done-sub">Cards you swiped \u201cI know\u201d will come back here when<br/>their review time arrives (1 day \u2192 3 days \u2192 1 week \u2192 2 weeks \u2192 1 month).<br/>Tap <b>Due</b> to see what is coming, or <b>Add</b> / <b>Import</b> more.</div></div>';
  if(idx>=list.length) idx=list.length-1;
  if(idx<0) idx=0;
  var c = list[idx];
  var h = '<div class="deck-info"><b>'+list.length+'</b> to study'+(browseOrder?' \u00b7 mixed':'')+' \u00b7 tap to flip</div>';
  h += '<div class="card-wrapper" data-swipe="browse" data-id="'+c.id+'">'+
    '<div class="swipe-hint got" id="hintGot">\u2713 I KNOW IT</div>'+
    '<div class="swipe-hint forgot" id="hintForgot">\u21BA NOT YET</div>'+
    '<div class="card-inner'+(flipped?' flipped':'')+'">'+
    '<div class="card-face card-front"><div class="card-label">Term</div><div class="card-word">'+esc(c.front)+'</div><div class="card-hint">tap to flip \u00b7 swipe to grade</div></div>'+
    '<div class="card-face card-back"><div class="card-label">Definition</div><div class="card-definition">'+esc(c.back)+'</div></div>'+
  '</div></div>';
  h += '<div class="card-controls">'+
    '<button class="ctrl-btn" data-nav="-1"'+(idx===0?' disabled':'')+'>\u2039</button>'+
    '<span class="card-counter">'+(idx+1)+' / '+list.length+'</span>'+
    '<button class="ctrl-btn" data-nav="1"'+(idx>=list.length-1?' disabled':'')+'>\u203A</button>'+
  '</div>';
  h += '<div class="swipe-tip">\u2190 swipe left: still learning (stays here) \u00b7 swipe right: I know it (sent to review) \u2192</div>';
  h += '<div class="mix-row">'+
       '<button class="mix-btn" data-mix="1">\uD83D\uDD00 Mix cards</button>'+
       (browseOrder?'<button class="mix-btn alt" data-reset="1">Reset order</button>':'')+
       '</div>';
  h += '<div style="text-align:center;margin-top:16px"><span class="link" data-go="list">view all cards \u2192</span></div>';
  return h;
}

function renderReview(due){
  var h='<div class="panel">';
  if(due.length===0){
    h += '<div class="all-done"><div class="all-done-icon">\u2713</div><div class="all-done-title">All caught up</div>'+
      '<div class="all-done-sub">No cards are due right now.<br/>New cards return 1 day after adding, then<br/>3 days, 1 week, 2 weeks, 1 month.<br/>Tap <b>Due</b> to see what is coming.</div></div>';
  } else {
    var c = due[0];
    h += '<div class="review-progress"><b>'+due.length+'</b> card'+(due.length!==1?'s':'')+' due \u00b7 recall it, then grade yourself</div>';
    h += '<div class="review-card"><div class="review-stage">'+stageLabel(c.level)+'</div><div class="review-word">'+esc(c.front)+'</div>';
    if(!revealed){
      h += '<div class="review-prompt">Do you remember what this means?</div><button class="reveal-btn" data-reveal="1">Show answer</button>';
    } else {
      h += '<div class="review-answer">'+esc(c.back)+'</div>'+
        '<div class="review-grade">'+
          '<button class="grade-btn grade-forgot" data-grade="0" data-id="'+c.id+'">Forgot \u2014 sooner</button>'+
          '<button class="grade-btn grade-got" data-grade="1" data-id="'+c.id+'">Got it \u2014 space out</button>'+
        '</div>';
    }
    h += '</div>';
  }
  return h+'</div>';
}

function renderAdd(){
  var h='<div class="panel">';
  h += '<div class="panel-title">Add a new card</div>';
  if(!settings.apiKey){
    h += '<div class="banner">Auto-definitions need a free API key. Tap <span class="link" data-go="settings">Setup \u2699</span> to add one (takes ~1 min). You can always type definitions yourself instead.</div>';
  } else {
    h += '<div class="panel-desc">Type a word and tap Generate \u2014 review/edit the definition, then add it. It returns for review on a spaced schedule.</div>';
  }
  h += '<label class="field-label">Word or Term</label>';
  h += '<div class="row"><input class="field-input" id="word" placeholder="e.g. Hematoma" value="'+esc(genState.word)+'" />'+
       '<button class="gen-btn" id="genBtn">'+(genState.busy?'<span class="spinner"></span>':'\u2726 Generate')+'</button></div>';
  h += '<div class="def-meta"><label class="field-label" style="margin:0">Definition</label>'+
       (genState.value && !genState.busy ? '<button class="regen-link" id="regen">regenerate</button>':'')+'</div>';
  h += '<textarea class="field-textarea" id="def" placeholder="Tap Generate, or type the meaning yourself\u2026">'+esc(genState.value)+'</textarea>';
  if(genState.error) h += '<div class="err">'+esc(genState.error)+'</div>';
  h += '<button class="primary-btn" id="addBtn">Add to Deck</button>';
  return h+'</div>';
}

function renderImport(){
  var h='<div class="panel"><div class="panel-title">Import a pack</div>';
  h += '<div class="panel-desc">Ask Claude to build a flashcard pack for an article, then paste it here \u2014 or just open the link Claude gives you. Imported cards join the same spaced-repetition schedule and keep returning even after you mark them known.</div>';
  if(pendingImport && pendingImport.length){
    h += '<div class="banner" style="color:#4db8b0;background:#0e2520;border-color:#1a4035">Found <b>'+pendingImport.length+'</b> card'+(pendingImport.length!==1?'s':'')+' in this link.<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
         '<button class="mix-btn" data-importlink="1">Add '+pendingImport.length+' cards</button>'+
         '<button class="mix-btn alt" data-discardlink="1">Discard</button></div></div>';
  }
  h += '<label class="field-label">Paste pack (JSON, or "Term :: Definition" lines)</label>';
  h += '<textarea class="field-textarea" id="importText" placeholder=\'{"cards":[{"front":"Tensor","back":"A multi-dimensional array of numbers..."}]}\' style="height:160px">'+esc(importText)+'</textarea>';
  if(importMsg) h += '<div class="err">'+esc(importMsg)+'</div>';
  h += '<button class="primary-btn" id="importBtn">Add cards</button>';
  h += '<div class="settings-note">Tip \u2014 ask Claude: \u201cMake me an importable flashcard pack for [article]. Assume I don\u2019t know [terms]. Output a JSON object with a cards array of front/back, plus an import link.\u201d</div>';
  h += '<div style="border-top:1px solid #242d42;margin-top:22px;padding-top:20px">';
  h += '<label class="field-label">Share my deck</label>';
  h += '<button class="mix-btn" data-makelink="1">Create a link of my '+cards.length+' cards</button>';
  if(shareLink) h += '<textarea class="field-textarea" readonly id="shareBox" style="height:96px;margin-top:12px;font-size:12px">'+esc(shareLink)+'</textarea><div class="settings-note">Open this on another device to copy your deck there, or paste it into any QR-code generator.</div>';
  h += '</div>';
  return h+'</div>';
}

function renderSchedule(){
  var h='<div class="panel"><div class="panel-title">Review schedule</div>'+
    '<div class="panel-desc">Cards you swiped \u201cI know\u201d are scheduled to return to the Cards page. The rest are still on the front page now.</div>';
  if(cards.length===0) h += '<div class="empty-state">No cards yet.</div>';
  else {
    cards.slice().sort(function(a,b){
      var aw=a.inRotation?1:0, bw=b.inRotation?1:0;
      if(aw!==bw) return aw-bw;
      return a.nextReview-b.nextReview;
    }).forEach(function(c){
      var stage = c.inRotation ? stageLabel(c.level) : "On the Cards page";
      var d = c.inRotation ? dueLabel(c.nextReview) : { t:"Studying", c:"due-now" };
      h += '<div class="sched-item"><div><div class="sched-word">'+esc(c.front)+'</div><div class="sched-stage">'+stage+'</div></div>'+
           '<div class="sched-due '+d.c+'">'+d.t+'</div></div>';
    });
  }
  return h+'</div>';
}

function renderList(){
  var h='<div class="panel"><div class="panel-title">All cards</div><div class="panel-desc">'+cards.length+' total. Remove anything you have mastered.</div>';
  if(cards.length===0) h += '<div class="empty-state">No cards yet.</div>';
  else cards.forEach(function(c){
    h += '<div class="list-item"><div><div class="list-word">'+esc(c.front)+'</div><div class="list-def">'+esc(c.back)+'</div></div>'+
         '<button class="list-remove" data-remove="'+c.id+'">\u2715</button></div>';
  });
  return h+'</div>';
}

function renderSettings(){
  var connected = settings.apiKey ? '<span class="ok-pill">Key saved</span>' : '';
  var h='<div class="panel"><div class="panel-title">Setup '+connected+'</div>';
  h += '<div class="panel-desc">Auto-definitions use a free, OpenAI-compatible AI provider. <b>Groq</b> is recommended: free, no credit card, runs open models.</div>';
  h += '<div class="banner">Get a key: open <span class="link" data-ext="https://console.groq.com/keys">console.groq.com/keys</span>, sign in, create a key (starts with <b>gsk_</b>), paste it below. Your key is stored only on this device.</div>';
  h += '<label class="field-label">API Base URL</label><input class="field-input mb" id="baseUrl" value="'+esc(settings.baseUrl)+'" />';
  h += '<label class="field-label">API Key</label><input class="field-input mb" id="apiKey" type="password" placeholder="gsk_..." value="'+esc(settings.apiKey)+'" />';
  h += '<label class="field-label">Model</label><input class="field-input" id="model" value="'+esc(settings.model)+'" />';
  h += '<div class="settings-note">Default model <b>llama-3.3-70b-versatile</b> works well. For speed try <b>llama-3.1-8b-instant</b>. If a model name is rejected, check current names at console.groq.com. Works with OpenRouter/Together too \u2014 just change the base URL and key.</div>';
  h += '<button class="primary-btn" id="saveBtn">Save settings</button>';
  return h+'</div>';
}

// ---------- wire events ----------
function wire(){
  document.querySelectorAll("[data-go]").forEach(function(el){ el.onclick=function(){ go(el.getAttribute("data-go")); }; });
  document.querySelectorAll("[data-ext]").forEach(function(el){ el.onclick=function(){ window.open(el.getAttribute("data-ext"),"_blank"); }; });
  document.querySelectorAll("[data-nav]").forEach(function(el){ el.onclick=function(){ nav(parseInt(el.getAttribute("data-nav"),10)); }; });
  document.querySelectorAll("[data-jump]").forEach(function(el){ el.onclick=function(){ jump(parseInt(el.getAttribute("data-jump"),10)); }; });
  document.querySelectorAll("[data-remove]").forEach(function(el){ el.onclick=function(e){ e.stopPropagation(); removeCard(el.getAttribute("data-remove")); }; });
  document.querySelectorAll("[data-mix]").forEach(function(el){ el.onclick=function(){ mixCards(); }; });
  document.querySelectorAll("[data-reset]").forEach(function(el){ el.onclick=function(){ resetOrder(); }; });
  var importBtn=document.getElementById("importBtn");
  if(importBtn) importBtn.onclick=function(){
    var t=document.getElementById("importText").value; importText=t;
    var parsed=parsePack(t);
    if(!parsed){ importMsg="Couldn't read that. Paste JSON with a cards array, or lines like  Term :: Definition"; render(); return; }
    importMsg=""; importCards(parsed);
  };
  var ilink=document.querySelector("[data-importlink]"); if(ilink) ilink.onclick=function(){ importCards(pendingImport); };
  var dlink=document.querySelector("[data-discardlink]"); if(dlink) dlink.onclick=function(){ pendingImport=null; render(); };
  var mlink=document.querySelector("[data-makelink]"); if(mlink) mlink.onclick=function(){ shareLink=buildShareLink(cards); render(); };
  var itEl=document.getElementById("importText"); if(itEl) itEl.oninput=function(){ importText=itEl.value; };
  var rv=document.querySelector("[data-reveal]"); if(rv) rv.onclick=function(){ revealed=true; render(); };

  // swipe-to-grade: attach drag start to the current browse card
  swipe.el=null; swipe.dragging=false;
  var sc=document.querySelector("[data-swipe]");
  if(sc){ sc.addEventListener("touchstart", swipeStart, {passive:true}); sc.addEventListener("mousedown", swipeStart); }

  var genBtn=document.getElementById("genBtn");
  if(genBtn) genBtn.onclick=function(){ var w=document.getElementById("word").value; var d=document.getElementById("def"); if(d) genState.value=d.value; generate(w); };
  var regen=document.getElementById("regen");
  if(regen) regen.onclick=function(){ generate(document.getElementById("word").value); };
  var addBtn=document.getElementById("addBtn");
  if(addBtn) addBtn.onclick=function(){ addCard(document.getElementById("word").value, document.getElementById("def").value); };

  // keep typed values in state so re-render doesn't wipe them
  var wEl=document.getElementById("word"); if(wEl) wEl.oninput=function(){ genState.word=wEl.value; };
  var dEl=document.getElementById("def"); if(dEl) dEl.oninput=function(){ genState.value=dEl.value; };

  var saveBtn=document.getElementById("saveBtn");
  if(saveBtn) saveBtn.onclick=function(){
    saveSettings(document.getElementById("baseUrl").value, document.getElementById("apiKey").value, document.getElementById("model").value);
  };
}

window.addEventListener("mousemove", swipeMove);
window.addEventListener("mouseup", swipeEnd);
window.addEventListener("touchmove", swipeMove, {passive:false});
window.addEventListener("touchend", swipeEnd);

// If opened via an import link (#import=base64 or #add=urlencoded-json), stage the cards.
(function(){
  var h = location.hash || "";
  var json = null;
  try{
    if(h.indexOf("#import=")===0) json = b64ToStr(decodeURIComponent(h.slice(8)));
    else if(h.indexOf("#add=")===0) json = decodeURIComponent(h.slice(5));
  }catch(e){ json=null; }
  if(json){
    var parsed = parsePack(json);
    if(parsed){ pendingImport = parsed; view = "import"; }
    try{ history.replaceState(null, "", location.pathname + location.search); }catch(e){}
  }
})();

render();
